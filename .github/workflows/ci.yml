name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Core, Python ${{ matrix.python-version }}, ${{ matrix.backend.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 4
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        # Every backend runs against the latest redis-py.  Client-version
        # coverage (the older majors we support) lives in the test-redis-py
        # job below, the same way test-windows owns the Windows leg.
        backend:
          - name: "Memory"
            redis-version: "memory"
          - name: "Redis 6"
            redis-version: "6.2"
          - name: "Redis 7"
            redis-version: "7.4"
          - name: "Redis 8"
            redis-version: "8.6"
          - name: "Redis 8 Cluster"
            redis-version: "8.6-cluster"
          - name: "Valkey 8"
            redis-version: "valkey-8.1"
        include:
          # Debug hanging tests in 3.12 cluster mode
          - python-version: "3.12"
            backend:
              name: "Redis 8 Cluster"
              redis-version: "8.6-cluster"
            pytest-args: "-v -s -W ignore::ResourceWarning"
          # Cluster mode emits ResourceWarning about unclosed sockets during
          # test teardown. The warnings appear related to redis-py's cluster
          # pub/sub connection management. Ignoring until upstream fixes land.
          - python-version: "3.10"
            backend:
              name: "Redis 8 Cluster"
              redis-version: "8.6-cluster"
            pytest-args: "-W ignore::ResourceWarning"
          - python-version: "3.11"
            backend:
              name: "Redis 8 Cluster"
              redis-version: "8.6-cluster"
            pytest-args: "-W ignore::ResourceWarning"
          - python-version: "3.13"
            backend:
              name: "Redis 8 Cluster"
              redis-version: "8.6-cluster"
            pytest-args: "-W ignore::ResourceWarning"
          - python-version: "3.14"
            backend:
              name: "Redis 8 Cluster"
              redis-version: "8.6-cluster"
            pytest-args: "-W ignore::ResourceWarning"
          # ACL variants only run on latest Python to save CI time
          - python-version: "3.14"
            backend:
              name: "Redis 8 with ACL"
              redis-version: "8.6-acl"
            pytest-args: ""
          - python-version: "3.14"
            backend:
              name: "Valkey 8 with ACL"
              redis-version: "valkey-8.1-acl"
            pytest-args: ""

    steps:
      - uses: actions/checkout@v6

      - name: Install uv and set Python version
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --upgrade-package redis

      - name: Run tests
        env:
          REDIS_VERSION: ${{ matrix.backend.redis-version }}
        run: uv run pytest --ignore=tests/cli --cov-branch --cov-config=.coveragerc-core --cov-fail-under=100 --cov-report=xml --cov-report=term-missing:skip-covered --junitxml=junit.xml -o junit_family=legacy ${{ matrix.pytest-args }}

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: python-${{ matrix.python-version }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results

  test-cli:
    name: CLI, Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 4
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv and set Python version
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --upgrade-package 'redis>=5'

      - name: Run CLI tests
        env:
          REDIS_VERSION: "8.6"
        run: >
          uv run pytest tests/cli/
          -o 'addopts=--import-mode=importlib'
          --numprocesses=logical --maxprocesses=4
          --cov=src/docket/cli --cov=tests/cli
          --cov-config=.coveragerc-cli
          --cov-branch --cov-fail-under=100
          --cov-report=xml --cov-report=term-missing:skip-covered
          --junitxml=junit.xml -o junit_family=legacy
          --timeout=30

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: cli-python-${{ matrix.python-version }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results

  test-windows:
    name: Windows, Python ${{ matrix.python-version }}
    runs-on: windows-latest
    timeout-minutes: 6
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv and set Python version
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --upgrade-package 'redis>=5'

      - name: Run tests
        env:
          REDIS_VERSION: memory
        run: >
          uv run pytest --ignore=tests/cli
          --cov-branch --cov-config=.coveragerc-core
          --cov-fail-under=100
          --cov-report=xml --cov-report=term-missing:skip-covered
          --junitxml=junit.xml -o junit_family=legacy

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: windows-python-${{ matrix.python-version }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results

  test-redis-py:
    name: redis-py ${{ matrix.redis-py.name }}, Python 3.14, Redis 8.6
    runs-on: ubuntu-latest
    timeout-minutes: 4
    strategy:
      fail-fast: false
      matrix:
        # The client is what varies here, so we pin one Python and one real
        # Redis and sweep the redis-py majors we support.  A real backend is
        # required: the bug this guards (issue #425) is a client socket
        # timeout, which the memory backend can't exercise.
        redis-py:
          - { name: "5", spec: ">=5,<6" }
          - { name: "8", spec: ">=8" }
    steps:
      - uses: actions/checkout@v6

      - name: Install uv and set Python version
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --upgrade-package 'redis${{ matrix.redis-py.spec }}'

      - name: Run tests
        env:
          REDIS_VERSION: "8.6"
        run: >
          uv run pytest --ignore=tests/cli
          --cov-branch --cov-config=.coveragerc-core
          --cov-fail-under=100
          --cov-report=xml --cov-report=term-missing:skip-covered
          --junitxml=junit.xml -o junit_family=legacy

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: redis-py-${{ matrix.redis-py.name }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results

  prek:
    name: Prek checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install uv and set Python version
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install dependencies
        run: uv sync

      - name: Run prek
        uses: j178/prek-action@v2
